<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Fonna</title>
  <style>
    :root {
      --navy:#1A1A2E; --navy-mid:#16213E; --navy-deep:#0F3460;
      --coral:#E94560; --coral-dark:#C73652;
      --border:rgba(255,255,255,0.09); --text:#f4f4f2;
      --muted:#a4a4a0; --soft:#d8d8d2;
      --shadow:0 18px 50px rgba(0,0,0,0.38); --max:1240px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text); background: var(--navy);
      min-height: 100vh; position: relative; overflow-x: hidden;
      display: flex; flex-direction: column;
    }
    body::before { content:''; position:fixed; top:-120px; right:-120px; width:480px; height:480px; border-radius:50%; background:var(--coral); opacity:0.07; pointer-events:none; z-index:0; }
    body::after  { content:''; position:fixed; bottom:10%; left:-100px; width:340px; height:340px; border-radius:50%; background:var(--navy-deep); opacity:0.6; pointer-events:none; z-index:0; }
    a { color: inherit; text-decoration: none; }
    .wrap { width: min(var(--max), calc(100% - 32px)); margin: 0 auto; position: relative; z-index: 1; }
    .nav-shell { position:sticky; top:0; z-index:50; backdrop-filter:blur(14px); background:rgba(26,26,46,0.88); border-bottom:1px solid rgba(255,255,255,0.07); }
    .nav { display:flex; align-items:center; justify-content:space-between; gap:20px; min-height:76px; }
    .brand { display:flex; align-items:center; gap:12px; font-size:1.05rem; font-weight:700; }
    .brand-mark { width:34px; height:34px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(233,69,96,0.35); flex-shrink:0; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:10px; min-height:46px; padding:0 20px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,0.06); color:var(--text); font-weight:600; transition:transform 0.18s,background 0.18s; cursor:pointer; font-family:inherit; font-size:inherit; }
    .btn:hover { transform:translateY(-1px); background:rgba(255,255,255,0.1); }
    .btn.primary { background:var(--coral); color:#fff; border-color:transparent; box-shadow:0 10px 28px rgba(233,69,96,0.35); }
    .btn.primary:hover { background:var(--coral-dark); }
    main { flex:1; display:flex; align-items:center; justify-content:center; padding:60px 0; position:relative; z-index:1; }
    .card {
      max-width:520px; width:100%;
      border-radius:28px; border:1px solid rgba(255,255,255,0.08);
      background:var(--navy-mid); box-shadow:var(--shadow);
      padding:52px 48px; text-align:center;
      position:relative; overflow:hidden;
    }
    .card::before { content:''; position:absolute; top:-50px; right:-50px; width:200px; height:200px; border-radius:50%; background:var(--coral); opacity:0.07; pointer-events:none; }
    .card::after  { content:''; position:absolute; bottom:-40px; left:-40px; width:160px; height:160px; border-radius:50%; background:var(--navy-deep); opacity:0.7; pointer-events:none; }
    .check {
      width:64px; height:64px; border-radius:50%;
      background:rgba(233,69,96,0.12); border:1px solid rgba(233,69,96,0.3);
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 28px; position:relative; z-index:1;
    }
    h1 { font-size:clamp(1.8rem,4vw,2.4rem); letter-spacing:-0.04em; margin:0 0 14px; position:relative; z-index:1; }
    .sub { color:var(--soft); font-size:1rem; line-height:1.7; margin:0 0 36px; position:relative; z-index:1; }
    .actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; position:relative; z-index:1; }
    .footer { padding:24px 0 48px; color:var(--muted); position:relative; z-index:1; }
    .footer-shell { display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; border-top:1px solid rgba(255,255,255,0.08); padding-top:20px; }
    .footer-links { display:flex; gap:18px; flex-wrap:wrap; }
    .footer-links a:hover { color:var(--text); }
    .footer-social { display:flex; align-items:center; gap:16px; }
    .social-icon { display:flex; align-items:center; color:var(--muted); transition:color 0.18s; }
    .social-icon:hover { color:var(--text); }
    .contact-link { color:var(--muted); cursor:pointer; background:none; border:none; font:inherit; font-size:13px; padding:0; transition:color 0.15s; }
    .contact-link:hover { color:var(--text); }
    /* Modal */
    .overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(10,10,20,0.75); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:20px; }
    .overlay.open { display:flex; }
    .modal { background:var(--navy-mid); border:1px solid rgba(255,255,255,0.1); border-radius:24px; padding:36px; width:100%; max-width:480px; position:relative; box-shadow:0 24px 60px rgba(0,0,0,0.5); }
    .modal-close { position:absolute; top:16px; right:16px; background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.4rem; line-height:1; padding:4px; }
    .modal h3 { margin:0 0 6px; font-size:1.3rem; letter-spacing:-0.03em; }
    .modal p  { margin:0 0 24px; color:var(--muted); font-size:0.9rem; line-height:1.6; }
    .form-grid { display:grid; gap:14px; }
    .flbl { display:block; font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); margin-bottom:6px; }
    .finput { width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:10px 14px; color:var(--text); font-size:0.92rem; font-family:inherit; box-sizing:border-box; transition:border-color 0.15s; }
    .finput:focus { outline:none; border-color:var(--coral); }
    .finput::placeholder { color:var(--muted); }
    .ferr { display:none; color:#f4a0af; font-size:0.84rem; background:rgba(233,69,96,0.1); border:1px solid rgba(233,69,96,0.25); border-radius:10px; padding:10px 14px; }
    .ferr.show { display:block; }
    .fsubmit { width:100%; min-height:46px; border-radius:12px; border:none; background:var(--coral); color:#fff; font-size:0.95rem; font-weight:700; cursor:pointer; font-family:inherit; transition:background 0.15s; }
    .fsubmit:hover { background:var(--coral-dark); }
    .fsubmit:disabled { opacity:0.5; cursor:not-allowed; }
  </style>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <div class="nav-shell">
    <div class="wrap nav">
      <a href="/" class="brand">
        <span class="brand-mark">
          <svg width="34" height="34" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" style="display:block;border-radius:10px;">
            <circle cx="200" cy="200" r="200" fill="#1A1A2E"/>
            <circle cx="340" cy="80" r="130" fill="#E94560" opacity="0.10"/>
            <circle cx="60" cy="310" r="90" fill="#16213E" opacity="0.9"/>
            <circle cx="320" cy="300" r="70" fill="#0F3460" opacity="0.6"/>
            <circle cx="100" cy="100" r="50" fill="#E94560" opacity="0.06"/>
            <rect x="138" y="130" width="34" height="155" rx="4" fill="#FFFFFF"/>
            <rect x="138" y="130" width="110" height="34" rx="4" fill="#FFFFFF"/>
            <rect x="138" y="196" width="84" height="28" rx="4" fill="#E94560"/>
            <circle cx="272" cy="318" r="18" fill="#E94560"/>
          </svg>
        </span>
        <span>Fonna</span>
      </a>
      <a href="/#login" class="btn primary">Try Fonna free</a>
    </div>
  </div>

  <main>
    <div class="wrap">
      <div class="card">
        <div class="check">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#E94560" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <h1>Message received.</h1>
        <p class="sub">Thanks for reaching out. We read every message and will get back to you as soon as we can.</p>
        <div class="actions">
          <a href="/" class="btn primary">Back to Fonna</a>
          <a href="/faq.html" class="btn">Read the FAQ</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="wrap">
      <div class="footer-shell">
        <span>&copy; 2026 Fonna, a division of 170681639 Ontario</span>
        <div class="footer-links">
          <a href="/philosophy.html">Philosophy</a>
          <a href="/terms.html">Terms of Use</a>
          <a href="/faq.html">FAQ</a>
          <button class="contact-link" onclick="openContact()">Contact Us</button>
        </div>
        <div class="footer-social">
          <a href="https://www.instagram.com/fonna.ai/" target="_blank" rel="noopener" aria-label="Fonna on Instagram" class="social-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
          </a>
          <a href="https://www.facebook.com/profile.php?id=948309055043464" target="_blank" rel="noopener" aria-label="Fonna on Facebook" class="social-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <div id="contactOverlay" class="overlay">
    <div class="modal">
      <button class="modal-close" onclick="closeContact()">&times;</button>
      <h3>Get in touch</h3>
      <p>We read every message and will follow up by email.</p>
      <div class="form-grid">
        <div><label class="flbl">Your name</label><input id="cName" class="finput" type="text" placeholder="Ewen McIntosh" /></div>
        <div><label class="flbl">Your email</label><input id="cEmail" class="finput" type="email" placeholder="you@example.com" /></div>
        <div><label class="flbl">Message</label><textarea id="cMessage" class="finput" rows="4" placeholder="What's on your mind?"></textarea></div>
        <div id="contactErr" class="ferr"></div>
        <button class="fsubmit" id="contactSubmitBtn" onclick="submitContact()">Send message</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL      = "https://kukqwyakchsaqquudqiu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt1a3F3eWFrY2hzYXFxdXVkcWl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDcxOTcsImV4cCI6MjA4ODk4MzE5N30.BBrrou52a9XJBFEDOwk4ON7W2f1NhZGljXJSsrs4iKY";

    function openContact()  { document.getElementById("contactOverlay").classList.add("open"); document.body.style.overflow = "hidden"; }
    function closeContact() { document.getElementById("contactOverlay").classList.remove("open"); document.body.style.overflow = ""; }
    document.getElementById("contactOverlay").addEventListener("click", e => { if (e.target === e.currentTarget) closeContact(); });
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeContact(); });

    async function submitContact() {
      const name    = document.getElementById("cName").value.trim();
      const email   = document.getElementById("cEmail").value.trim();
      const message = document.getElementById("cMessage").value.trim();
      const errEl   = document.getElementById("contactErr");
      const btn     = document.getElementById("contactSubmitBtn");
      errEl.classList.remove("show");
      if (!name)                        { errEl.textContent = "Please enter your name."; errEl.classList.add("show"); return; }
      if (!email || !email.includes("@")) { errEl.textContent = "Please enter a valid email address."; errEl.classList.add("show"); return; }
      if (!message)                     { errEl.textContent = "Please enter a message."; errEl.classList.add("show"); return; }
      btn.disabled = true; btn.textContent = "Sending…";
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/contacts`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}`, "Prefer": "return=minimal" },
          body: JSON.stringify({ name, email, message })
        });
        if (!res.ok) throw new Error();
        window.location.href = "/thankyou.html";
      } catch {
        errEl.textContent = "Something went wrong — please try again.";
        errEl.classList.add("show");
        btn.disabled = false; btn.textContent = "Send message";
      }
    }
  </script>
</body>
</html>
